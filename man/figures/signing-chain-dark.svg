<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 272" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="The code signing chain of trust for shinyelectron apps: a certificate from a trusted authority signs the app during export, the signed build is distributed, and the end user's operating system verifies the signature before launching.">
  <defs>
    <filter id="cs-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.07"/>
    </filter>
    <marker id="cs-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <clipPath id="cs-card-clip"><rect width="180" height="88" rx="10"/></clipPath>
    <clipPath id="cs-strip-clip"><rect width="840" height="124" rx="10"/></clipPath>
  </defs>

  <!-- Section label -->
  <text x="440" y="18" text-anchor="middle" font-size="12" font-weight="700" fill="#cbd5e1" letter-spacing="1">THE CHAIN OF TRUST</text>

  <!-- Stage 1: Certificate -->
  <g transform="translate(20, 34)" filter="url(#cs-shadow)">
    <rect width="180" height="88" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect width="180" height="3" fill="#3b82f6" clip-path="url(#cs-card-clip)"/>
    <text x="16" y="22" font-size="11" font-weight="700" fill="#3b82f6" letter-spacing="0.5">1. CERTIFICATE</text>
    <line x1="16" y1="30" x2="164" y2="30" stroke="#334155" stroke-width="1"/>
    <text x="16" y="50" font-size="12" font-weight="600" fill="#e2e8f0">Issued by a CA</text>
    <text x="16" y="66" font-size="11" fill="#cbd5e1">Apple, DigiCert,</text>
    <text x="16" y="80" font-size="11" fill="#cbd5e1">Sectigo, or GPG.</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M 208 78 L 236 78" stroke="#cbd5e1" stroke-width="1.5" fill="none" marker-end="url(#cs-arrow)"/>

  <!-- Stage 2: Signing -->
  <g transform="translate(240, 34)" filter="url(#cs-shadow)">
    <rect width="180" height="88" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect width="180" height="3" fill="#8b5cf6" clip-path="url(#cs-card-clip)"/>
    <text x="16" y="22" font-size="11" font-weight="700" fill="#8b5cf6" letter-spacing="0.5">2. SIGNING</text>
    <line x1="16" y1="30" x2="164" y2="30" stroke="#334155" stroke-width="1"/>
    <text x="16" y="50" font-size="12" font-weight="600" fill="#e2e8f0" font-family="'SF Mono', Menlo, Consolas, monospace">sign = TRUE</text>
    <text x="16" y="66" font-size="11" fill="#cbd5e1">electron-builder</text>
    <text x="16" y="80" font-size="11" fill="#cbd5e1">stamps the build.</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M 428 78 L 456 78" stroke="#cbd5e1" stroke-width="1.5" fill="none" marker-end="url(#cs-arrow)"/>

  <!-- Stage 3: Signed build -->
  <g transform="translate(460, 34)" filter="url(#cs-shadow)">
    <rect width="180" height="88" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect width="180" height="3" fill="#10b981" clip-path="url(#cs-card-clip)"/>
    <text x="16" y="22" font-size="11" font-weight="700" fill="#10b981" letter-spacing="0.5">3. SIGNED BUILD</text>
    <line x1="16" y1="30" x2="164" y2="30" stroke="#334155" stroke-width="1"/>
    <text x="16" y="50" font-size="12" font-weight="600" fill="#e2e8f0">.app / .exe / AppImage</text>
    <text x="16" y="66" font-size="11" fill="#cbd5e1">Cryptographic signature</text>
    <text x="16" y="80" font-size="11" fill="#cbd5e1">embedded in the artifact.</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M 648 78 L 676 78" stroke="#cbd5e1" stroke-width="1.5" fill="none" marker-end="url(#cs-arrow)"/>

  <!-- Stage 4: User opens -->
  <g transform="translate(680, 34)" filter="url(#cs-shadow)">
    <rect width="180" height="88" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect width="180" height="3" fill="#f59e0b" clip-path="url(#cs-card-clip)"/>
    <text x="16" y="22" font-size="11" font-weight="700" fill="#f59e0b" letter-spacing="0.5">4. USER OS</text>
    <line x1="16" y1="30" x2="164" y2="30" stroke="#334155" stroke-width="1"/>
    <text x="16" y="50" font-size="12" font-weight="600" fill="#e2e8f0">Opens cleanly</text>
    <text x="16" y="66" font-size="11" fill="#cbd5e1">OS checks the chain,</text>
    <text x="16" y="80" font-size="11" fill="#cbd5e1">no warning dialog.</text>
  </g>

  <!-- Platform strip -->
  <g transform="translate(20, 134)" filter="url(#cs-shadow)">
    <rect width="840" height="124" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect width="840" height="3" fill="#94a3b8" clip-path="url(#cs-strip-clip)"/>

    <text x="20" y="28" font-size="11" font-weight="700" fill="#cbd5e1" letter-spacing="0.5">WHAT THIS LOOKS LIKE PER PLATFORM</text>
    <line x1="20" y1="38" x2="820" y2="38" stroke="#334155" stroke-width="1"/>

    <!-- Column dividers (three even columns) -->
    <line x1="280" y1="48" x2="280" y2="112" stroke="#334155" stroke-width="1"/>
    <line x1="560" y1="48" x2="560" y2="112" stroke="#334155" stroke-width="1"/>

    <!-- macOS column -->
    <g transform="translate(28, 56)">
      <circle cx="6" cy="6" r="4" fill="#3b82f6"/>
      <text x="18" y="10" font-size="13" font-weight="700" fill="#e2e8f0">macOS</text>
      <text x="78" y="10" font-size="10" fill="#94a3b8">$99 / year</text>
      <text x="0" y="32" font-size="11" fill="#cbd5e1">Apple Developer ID plus notarization.</text>
      <text x="0" y="54" font-size="11" font-weight="600" fill="#f87171">Without signing: Gatekeeper blocks.</text>
    </g>

    <!-- Windows column -->
    <g transform="translate(308, 56)">
      <circle cx="6" cy="6" r="4" fill="#8b5cf6"/>
      <text x="18" y="10" font-size="13" font-weight="700" fill="#e2e8f0">Windows</text>
      <text x="88" y="10" font-size="10" fill="#94a3b8">$200 to $700 / year</text>
      <text x="0" y="32" font-size="11" fill="#cbd5e1">OV or EV cert from a commercial CA.</text>
      <text x="0" y="54" font-size="11" font-weight="600" fill="#f87171">Without signing: SmartScreen warns.</text>
    </g>

    <!-- Linux column -->
    <g transform="translate(588, 56)">
      <circle cx="6" cy="6" r="4" fill="#10b981"/>
      <text x="18" y="10" font-size="13" font-weight="700" fill="#e2e8f0">Linux</text>
      <text x="62" y="10" font-size="10" fill="#94a3b8">free</text>
      <text x="0" y="24" font-size="11" fill="#cbd5e1">GPG signing: reserved for a future</text>
      <text x="0" y="38" font-size="11" fill="#cbd5e1">release (no effect today).</text>
      <text x="0" y="54" font-size="11" font-weight="600" fill="#fbbf24">Without signing: no OS warning.</text>
    </g>
  </g>
</svg>
