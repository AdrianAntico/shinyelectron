<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Five-row matrix comparing the shinylive, bundled, auto-download, system, and container runtime strategies across three columns: what ships in the exported package, what happens on first launch, and the running architecture">
  <defs>
    <filter id="sc-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.07"/>
    </filter>
    <clipPath id="sc-card-clip"><rect width="180" height="56" rx="8"/></clipPath>
  </defs>

  <!-- Column headers -->
  <g transform="translate(0,24)">
    <text x="110" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#cbd5e1" letter-spacing="0.8">STRATEGY</text>
    <text x="310" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#e2e8f0" letter-spacing="0.6">SHIPS</text>
    <text x="310" y="32" text-anchor="middle" font-size="9" fill="#94a3b8">inside the exported package</text>
    <text x="525" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#e2e8f0" letter-spacing="0.6">FIRST LAUNCH</text>
    <text x="525" y="32" text-anchor="middle" font-size="9" fill="#94a3b8">what happens on first open</text>
    <text x="740" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#e2e8f0" letter-spacing="0.6">RUNNING</text>
    <text x="740" y="32" text-anchor="middle" font-size="9" fill="#94a3b8">steady-state architecture</text>
  </g>

  <!-- Divider under headers -->
  <line x1="24" y1="66" x2="816" y2="66" stroke="#334155" stroke-width="1"/>

  <!-- Row: shinylive -->
  <g transform="translate(0,78)">
    <!-- Row label card -->
    <g transform="translate(24,0)" filter="url(#sc-shadow)">
      <rect width="180" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <rect width="4" height="56" fill="#3b82f6" clip-path="url(#sc-card-clip)"/>
      <text x="100" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#60a5fa">shinylive</text>
      <text x="100" y="42" text-anchor="middle" font-size="10" fill="#94a3b8">WebR or Pyodide</text>
    </g>

    <!-- Ships cell -->
    <g transform="translate(220,0)" filter="url(#sc-shadow)">
      <rect width="190" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <g transform="translate(14,16)">
        <rect width="22" height="22" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.75"/>
        <text x="11" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#60a5fa">W</text>
      </g>
      <text x="48" y="26" font-size="11" font-weight="500" fill="#e2e8f0">Electron + WASM</text>
      <text x="48" y="40" font-size="10" fill="#cbd5e1">bundle</text>
    </g>

    <!-- First launch cell -->
    <g transform="translate(430,0)" filter="url(#sc-shadow)">
      <rect width="190" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <g transform="translate(14,18)">
        <circle cx="10" cy="10" r="9" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
        <path d="M 5 10 L 9 14 L 15 7" stroke="#16a34a" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="46" y="26" font-size="11" font-weight="500" fill="#e2e8f0">Opens offline</text>
      <text x="46" y="40" font-size="10" fill="#cbd5e1">no network needed</text>
    </g>

    <!-- Running cell -->
    <g transform="translate(640,0)" filter="url(#sc-shadow)">
      <rect width="190" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <g transform="translate(14,18)">
        <rect width="20" height="20" rx="3" fill="#1e293b" stroke="#cbd5e1" stroke-width="1"/>
        <rect width="20" height="6" rx="3" fill="#172554"/>
        <circle cx="4" cy="3" r="1" fill="#cbd5e1"/>
      </g>
      <text x="44" y="26" font-size="11" font-weight="500" fill="#e2e8f0">Browser runs app</text>
      <text x="44" y="40" font-size="10" fill="#cbd5e1">no child process</text>
    </g>
  </g>

  <!-- Row: bundled -->
  <g transform="translate(0,146)">
    <g transform="translate(24,0)" filter="url(#sc-shadow)">
      <rect width="180" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <rect width="4" height="56" fill="#8b5cf6" clip-path="url(#sc-card-clip)"/>
      <text x="100" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#a78bfa">bundled</text>
      <text x="100" y="42" text-anchor="middle" font-size="10" fill="#94a3b8">portable runtime inside</text>
    </g>

    <g transform="translate(220,0)" filter="url(#sc-shadow)">
      <rect width="190" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <g transform="translate(14,16)">
        <rect width="22" height="22" rx="4" fill="#2e1065" stroke="#8b5cf6" stroke-width="0.75"/>
        <text x="11" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#a78bfa">R/P</text>
      </g>
      <text x="48" y="26" font-size="11" font-weight="500" fill="#e2e8f0">Electron + portable</text>
      <text x="48" y="40" font-size="10" fill="#cbd5e1">R or Python</text>
    </g>

    <g transform="translate(430,0)" filter="url(#sc-shadow)">
      <rect width="190" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <g transform="translate(14,18)">
        <circle cx="10" cy="10" r="9" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
        <path d="M 5 10 L 9 14 L 15 7" stroke="#16a34a" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="46" y="26" font-size="11" font-weight="500" fill="#e2e8f0">Opens offline</text>
      <text x="46" y="40" font-size="10" fill="#cbd5e1">nothing to fetch</text>
    </g>

    <g transform="translate(640,0)" filter="url(#sc-shadow)">
      <rect width="190" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <g transform="translate(14,20)">
        <rect width="9" height="16" rx="2" fill="#2e1065" stroke="#8b5cf6" stroke-width="0.75"/>
        <rect x="14" y="0" width="9" height="16" rx="2" fill="#3b0764" stroke="#8b5cf6" stroke-width="0.75"/>
        <line x1="10" y1="8" x2="13" y2="8" stroke="#8b5cf6" stroke-width="1.2"/>
      </g>
      <text x="48" y="26" font-size="11" font-weight="500" fill="#e2e8f0">Spawns bundled</text>
      <text x="48" y="40" font-size="10" fill="#cbd5e1">runtime process</text>
    </g>
  </g>

  <!-- Row: auto-download -->
  <g transform="translate(0,214)">
    <g transform="translate(24,0)" filter="url(#sc-shadow)">
      <rect width="180" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <rect width="4" height="56" fill="#10b981" clip-path="url(#sc-card-clip)"/>
      <text x="100" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#6ee7b7">auto-download</text>
      <text x="100" y="42" text-anchor="middle" font-size="10" fill="#94a3b8">fetch + cache runtime</text>
    </g>

    <g transform="translate(220,0)" filter="url(#sc-shadow)">
      <rect width="190" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <g transform="translate(14,18)">
        <path d="M 10 2 L 10 14 M 5 10 L 10 15 L 15 10" stroke="#047857" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="2" y="17" width="16" height="2" rx="1" fill="#10b981"/>
      </g>
      <text x="44" y="26" font-size="11" font-weight="500" fill="#e2e8f0">Electron + small</text>
      <text x="44" y="40" font-size="10" fill="#cbd5e1">downloader stub</text>
    </g>

    <g transform="translate(430,0)" filter="url(#sc-shadow)">
      <rect width="190" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <g transform="translate(14,18)">
        <circle cx="10" cy="10" r="9" fill="#052e16" stroke="#059669" stroke-width="1"/>
        <path d="M 10 4 L 10 10 L 14 12" stroke="#047857" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </g>
      <text x="46" y="26" font-size="11" font-weight="500" fill="#e2e8f0">Fetch + cache</text>
      <text x="46" y="40" font-size="10" fill="#cbd5e1">runtime, one time</text>
    </g>

    <g transform="translate(640,0)" filter="url(#sc-shadow)">
      <rect width="190" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <g transform="translate(14,20)">
        <rect width="9" height="16" rx="2" fill="#052e16" stroke="#059669" stroke-width="0.75"/>
        <rect x="16" y="0" width="9" height="16" rx="2" fill="#064e3b" stroke="#059669" stroke-width="0.75"/>
        <text x="21" y="11" text-anchor="middle" font-size="5" fill="#6ee7b7">cache</text>
      </g>
      <text x="50" y="26" font-size="11" font-weight="500" fill="#e2e8f0">Spawns cached</text>
      <text x="50" y="40" font-size="10" fill="#cbd5e1">runtime process</text>
    </g>
  </g>

  <!-- Row: system -->
  <g transform="translate(0,282)">
    <g transform="translate(24,0)" filter="url(#sc-shadow)">
      <rect width="180" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <rect width="4" height="56" fill="#f59e0b" clip-path="url(#sc-card-clip)"/>
      <text x="100" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#fbbf24">system</text>
      <text x="100" y="42" text-anchor="middle" font-size="10" fill="#94a3b8">user's own install</text>
    </g>

    <g transform="translate(220,0)" filter="url(#sc-shadow)">
      <rect width="190" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <g transform="translate(14,16)">
        <rect width="22" height="22" rx="4" fill="#422006" stroke="#f59e0b" stroke-width="0.75"/>
        <text x="11" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#fbbf24">E</text>
      </g>
      <text x="48" y="26" font-size="11" font-weight="500" fill="#e2e8f0">Electron only</text>
      <text x="48" y="40" font-size="10" fill="#cbd5e1">no runtime embedded</text>
    </g>

    <g transform="translate(430,0)" filter="url(#sc-shadow)">
      <rect width="190" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <g transform="translate(14,18)">
        <circle cx="8" cy="8" r="6" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
        <line x1="12" y1="12" x2="17" y2="17" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
      </g>
      <text x="46" y="26" font-size="11" font-weight="500" fill="#e2e8f0">Find Rscript or</text>
      <text x="46" y="40" font-size="10" fill="#cbd5e1">python3 on PATH</text>
    </g>

    <g transform="translate(640,0)" filter="url(#sc-shadow)">
      <rect width="190" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <g transform="translate(14,20)">
        <rect width="9" height="16" rx="2" fill="#422006" stroke="#f59e0b" stroke-width="0.75"/>
        <rect x="16" y="0" width="9" height="16" rx="2" fill="#451a03" stroke="#f59e0b" stroke-width="0.75"/>
        <text x="21" y="11" text-anchor="middle" font-size="5" fill="#fbbf24">host</text>
      </g>
      <text x="50" y="26" font-size="11" font-weight="500" fill="#e2e8f0">Spawns system</text>
      <text x="50" y="40" font-size="10" fill="#cbd5e1">runtime process</text>
    </g>
  </g>

  <!-- Row: container -->
  <g transform="translate(0,350)">
    <g transform="translate(24,0)" filter="url(#sc-shadow)">
      <rect width="180" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <rect width="4" height="56" fill="#94a3b8" clip-path="url(#sc-card-clip)"/>
      <text x="100" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#cbd5e1">container</text>
      <text x="100" y="42" text-anchor="middle" font-size="10" fill="#94a3b8">Docker or Podman</text>
    </g>

    <g transform="translate(220,0)" filter="url(#sc-shadow)">
      <rect width="190" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <g transform="translate(14,16)">
        <rect width="22" height="22" rx="4" fill="#334155" stroke="#cbd5e1" stroke-width="0.75" stroke-dasharray="2,1.5"/>
        <text x="11" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#cbd5e1">yml</text>
      </g>
      <text x="48" y="26" font-size="11" font-weight="500" fill="#e2e8f0">Electron +</text>
      <text x="48" y="40" font-size="10" fill="#cbd5e1">container config</text>
    </g>

    <g transform="translate(430,0)" filter="url(#sc-shadow)">
      <rect width="190" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <g transform="translate(14,18)">
        <rect width="20" height="14" rx="2" fill="#334155" stroke="#cbd5e1" stroke-width="0.75" stroke-dasharray="2,1.5"/>
        <path d="M 10 6 L 10 12 M 7 9 L 10 12 L 13 9" stroke="#475569" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      </g>
      <text x="46" y="26" font-size="11" font-weight="500" fill="#e2e8f0">Pull image,</text>
      <text x="46" y="40" font-size="10" fill="#cbd5e1">start container</text>
    </g>

    <g transform="translate(640,0)" filter="url(#sc-shadow)">
      <rect width="190" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <g transform="translate(14,20)">
        <rect width="9" height="16" rx="2" fill="#334155" stroke="#cbd5e1" stroke-width="0.75"/>
        <text x="4.5" y="11" text-anchor="middle" font-size="5" fill="#cbd5e1">host</text>
        <rect x="14" y="0" width="12" height="16" rx="2" fill="#0f172a" stroke="#cbd5e1" stroke-width="0.75" stroke-dasharray="2,1"/>
        <text x="20" y="11" text-anchor="middle" font-size="5" fill="#cbd5e1">ctnr</text>
      </g>
      <text x="52" y="26" font-size="11" font-weight="500" fill="#e2e8f0">Electron to</text>
      <text x="52" y="40" font-size="10" fill="#cbd5e1">localhost to container</text>
    </g>
  </g>
</svg>
