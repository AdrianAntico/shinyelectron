<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="What the end user sees when opening a signed versus unsigned shinyelectron app on macOS, Windows, and Linux. On macOS, unsigned apps are blocked by Gatekeeper; signed and notarized apps open cleanly. On Windows, unsigned installers trigger SmartScreen warnings; signed installers open cleanly. On Linux, apps open without OS warnings whether signed or not; GPG signing is reserved for a future release and has no effect today, so no signature is produced.">
  <defs>
    <filter id="so-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.07"/>
    </filter>
    <clipPath id="so-label-clip"><rect width="100" height="96" rx="8"/></clipPath>
    <clipPath id="so-card-clip"><rect width="300" height="96" rx="8"/></clipPath>
  </defs>

  <!-- Section label -->
  <text x="440" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#cbd5e1" letter-spacing="1">WHAT THE USER SEES ON LAUNCH</text>

  <!-- Column headers -->
  <g transform="translate(140, 48)">
    <text x="150" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24" letter-spacing="0.5">WITHOUT SIGNING</text>
  </g>
  <g transform="translate(560, 48)">
    <text x="150" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#4ade80" letter-spacing="0.5">WITH SIGNING</text>
  </g>

  <!-- Row labels and per-platform pairs -->

  <!-- macOS row -->
  <g transform="translate(20, 72)">
    <rect width="100" height="96" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#so-shadow)"/>
    <rect width="3" height="96" fill="#3b82f6" clip-path="url(#so-label-clip)"/>
    <text x="56" y="42" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">macOS</text>
    <text x="56" y="62" text-anchor="middle" font-size="10" fill="#cbd5e1">Gatekeeper</text>
    <text x="56" y="78" text-anchor="middle" font-size="10" fill="#cbd5e1">enforced</text>
  </g>

  <!-- macOS without signing -->
  <g transform="translate(140, 72)" filter="url(#so-shadow)">
    <rect width="300" height="96" rx="8" fill="#1e293b" stroke="#b91c1c" stroke-width="1.5"/>
    <rect width="300" height="3" fill="#ef4444" clip-path="url(#so-card-clip)"/>
    <circle cx="28" cy="46" r="14" fill="#450a0a" stroke="#b91c1c" stroke-width="1.5"/>
    <text x="28" y="51" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">!</text>
    <text x="54" y="40" font-size="12" font-weight="700" fill="#f87171">Blocked by Gatekeeper</text>
    <text x="54" y="58" font-size="11" fill="#cbd5e1">&quot;App can&#39;t be opened because Apple</text>
    <text x="54" y="74" font-size="11" fill="#cbd5e1">cannot check it for malicious software.&quot;</text>
  </g>

  <!-- macOS with signing -->
  <g transform="translate(560, 72)" filter="url(#so-shadow)">
    <rect width="300" height="96" rx="8" fill="#1e293b" stroke="#166534" stroke-width="1.5"/>
    <rect width="300" height="3" fill="#10b981" clip-path="url(#so-card-clip)"/>
    <circle cx="28" cy="46" r="14" fill="#052e16" stroke="#166534" stroke-width="1.5"/>
    <path d="M 22 46 L 27 51 L 35 41" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="54" y="40" font-size="12" font-weight="700" fill="#86efac">Opens cleanly</text>
    <text x="54" y="58" font-size="11" fill="#cbd5e1">Apple verifies Developer ID and</text>
    <text x="54" y="74" font-size="11" fill="#cbd5e1">notarization ticket. No dialog.</text>
  </g>

  <!-- Windows row -->
  <g transform="translate(20, 188)">
    <rect width="100" height="96" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#so-shadow)"/>
    <rect width="3" height="96" fill="#8b5cf6" clip-path="url(#so-label-clip)"/>
    <text x="56" y="42" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">Windows</text>
    <text x="56" y="62" text-anchor="middle" font-size="10" fill="#cbd5e1">SmartScreen</text>
    <text x="56" y="78" text-anchor="middle" font-size="10" fill="#cbd5e1">enforced</text>
  </g>

  <!-- Windows without signing -->
  <g transform="translate(140, 188)" filter="url(#so-shadow)">
    <rect width="300" height="96" rx="8" fill="#1e293b" stroke="#b91c1c" stroke-width="1.5"/>
    <rect width="300" height="3" fill="#ef4444" clip-path="url(#so-card-clip)"/>
    <circle cx="28" cy="46" r="14" fill="#450a0a" stroke="#b91c1c" stroke-width="1.5"/>
    <text x="28" y="51" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">!</text>
    <text x="54" y="40" font-size="12" font-weight="700" fill="#f87171">SmartScreen warning</text>
    <text x="54" y="58" font-size="11" fill="#cbd5e1">&quot;Windows protected your PC. Microsoft</text>
    <text x="54" y="74" font-size="11" fill="#cbd5e1">Defender SmartScreen prevented...&quot;</text>
  </g>

  <!-- Windows with signing -->
  <g transform="translate(560, 188)" filter="url(#so-shadow)">
    <rect width="300" height="96" rx="8" fill="#1e293b" stroke="#166534" stroke-width="1.5"/>
    <rect width="300" height="3" fill="#10b981" clip-path="url(#so-card-clip)"/>
    <circle cx="28" cy="46" r="14" fill="#052e16" stroke="#166534" stroke-width="1.5"/>
    <path d="M 22 46 L 27 51 L 35 41" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="54" y="40" font-size="12" font-weight="700" fill="#86efac">Opens cleanly</text>
    <text x="54" y="58" font-size="11" fill="#cbd5e1">EV certs pass immediately; OV certs</text>
    <text x="54" y="74" font-size="11" fill="#cbd5e1">build reputation over a few weeks.</text>
  </g>

  <!-- Linux row -->
  <g transform="translate(20, 304)">
    <rect width="100" height="96" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#so-shadow)"/>
    <rect width="3" height="96" fill="#10b981" clip-path="url(#so-label-clip)"/>
    <text x="56" y="42" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">Linux</text>
    <text x="56" y="62" text-anchor="middle" font-size="10" fill="#cbd5e1">no OS</text>
    <text x="56" y="78" text-anchor="middle" font-size="10" fill="#cbd5e1">enforcement</text>
  </g>

  <!-- Linux without signing -->
  <g transform="translate(140, 304)" filter="url(#so-shadow)">
    <rect width="300" height="96" rx="8" fill="#1e293b" stroke="#c2410c" stroke-width="1.5"/>
    <rect width="300" height="3" fill="#f59e0b" clip-path="url(#so-card-clip)"/>
    <circle cx="28" cy="46" r="14" fill="#422006" stroke="#c2410c" stroke-width="1.5"/>
    <text x="28" y="51" text-anchor="middle" font-size="14" font-weight="700" fill="#f59e0b">?</text>
    <text x="54" y="40" font-size="12" font-weight="700" fill="#fbbf24">Opens, unverifiable</text>
    <text x="54" y="58" font-size="11" fill="#cbd5e1">No OS warning. Users who care</text>
    <text x="54" y="74" font-size="11" fill="#cbd5e1">cannot verify the artifact.</text>
  </g>

  <!-- Linux with signing -->
  <g transform="translate(560, 304)" filter="url(#so-shadow)">
    <rect width="300" height="96" rx="8" fill="#1e293b" stroke="#166534" stroke-width="1.5"/>
    <rect width="300" height="3" fill="#10b981" clip-path="url(#so-card-clip)"/>
    <circle cx="28" cy="46" r="14" fill="#052e16" stroke="#166534" stroke-width="1.5"/>
    <path d="M 22 46 L 27 51 L 35 41" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="54" y="40" font-size="12" font-weight="700" fill="#86efac">Opens, same as unsigned</text>
    <text x="54" y="58" font-size="11" fill="#cbd5e1">GPG signing is reserved for a future</text>
    <text x="54" y="74" font-size="11" fill="#cbd5e1">release; no signature is produced yet.</text>
  </g>
</svg>
